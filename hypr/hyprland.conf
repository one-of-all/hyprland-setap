# Hyprland Configuration File
# This file controls the behaviour of the Hyprland Wayland compositor.
# All settings are grouped by functionality for clarity.
# For full documentation, see: https://wiki.hyprland.org/

# =============================================================================
# Monitor Setup
# =============================================================================
# Automatically detect the primary monitor, use its preferred resolution,
# place it at the default position, and apply a scale factor of 1 (no scaling).
monitor = , preferred, auto, 1

# =============================================================================
# Modifier Key
# =============================================================================
# Define the main modifier key for most shortcuts (Super / Windows key).
$mod = SUPER

# =============================================================================
# Autostart Applications and Environment
# =============================================================================
# These commands run once when Hyprland starts.
# They set up background services, wallpaper, theme, notifications, and D‑Bus.

# Reload hyprpm plugins (if any) without blocking.
exec-once = hyprpm reload -n

# Start the wallpaper daemon (hyprpaper).
exec-once = hyprpaper

# Start the waybar
exec-once = waybar

# Restore the pywal colour scheme silently (no output).
# If you prefer a fixed theme for Rofi, you can comment this line out.
exec-once = wal -R -n

# (Optional) QuickShell launcher – currently commented out.
#exec-once = ~/.local/bin/start-quickshell.sh

# (Optional) Fullscreen helper script – commented out.
#exec-once = ~/.config/scripts/fullscreen.sh

# Start the Sway notification centre (swaync).
exec-once = swaync

# Export Wayland and desktop environment variables for systemd user sessions.
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# =============================================================================
# General Settings
# =============================================================================
general {
    # Inner gaps between windows (in pixels).
    gaps_in = 6
    # Outer gaps between windows and screen edges.
    gaps_out = 8
    # Border thickness around windows.
    border_size = 1
    # Active window border colour (RGB hex).
    col.active_border = rgba(00000022)
    # Inactive window border colour.
    col.inactive_border = rgba(00000000)
    # Default layout engine (dwindle – dynamic tiling).
    layout = dwindle
}

# =============================================================================
# Decoration (Visual Appearance)
# =============================================================================
# Note: Titlebar settings are managed by the 'hyprbars' plugin (see plugin section).
decoration {
    # Corner rounding radius for windows.
    rounding = 16

    # Titlebar configuration removed – use plugin section at the end.

    # Opacity for active windows (fully opaque).
    active_opacity = 1
    # Opacity for inactive windows (slightly transparent).
    inactive_opacity = 0.8

    # Dim inactive windows to reduce visual clutter.
    dim_inactive = true
    # Strength of the dimming effect.
    dim_strength = 0.04

    # Shadow settings for windows.
    shadow {
        enabled = true          # Enable drop shadows.
        range = 18              # Shadow blur radius.
        render_power = 3        # Shadow intensity curve.
        color = rgba(00000040)  # Shadow colour with alpha.
        offset = 0 6            # Shadow offset (x, y).
    }

    # Blur effect for translucent windows.
    blur {
        enabled = true
        size = 7                # Blur radius.
        passes = 3              # Number of blur passes (higher = smoother).
        ignore_opacity = true   # Blur regardless of window opacity.
        new_optimizations = true # Use optimised GPU path.
        special = true          # Apply blur to special workspaces.
        popups = true           # Blur popup windows.
        xray = false            # Do not exclude shadows from blur.

        vibrancy = 0.1696       # Color saturation boost for blurred areas.
    }
}

# =============================================================================
# Animations
# =============================================================================
animations {
    enabled = true

    # Custom easing curves for smooth motion.
    bezier = bounce, 0.0, 1.25, 0.15, 1.0
    bezier = buttery, 0.1, 1.15, 0.15, 1.02
    bezier = smooth, 0.0, 0.0, 0.12, 1.0
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    # Window show/hide animations.
    animation = windowsIn, 1, 4.5, bounce, slide
    animation = windowsOut, 1, 3.5, smooth, slide
    animation = windowsMove, 1, 4, buttery, slide

    # Fade animations for various elements.
    animation = fadeIn, 1, 3.5, smooth
    animation = fadeOut, 1, 3, smooth
    animation = fadeDim, 1, 4, smooth
    animation = fadeShadow, 1, 4, smooth

    # Workspace switching animations.
    animation = workspaces, 1, 4.5, buttery, slidefade 10%
    animation = specialWorkspace, 1, 4.5, buttery, slidefadevert -15%

    # Border and border angle animations (continuous loop).
    animation = border, 1, 7, smooth
    animation = borderangle, 1, 35, linear, loop

    # Layer surface (e.g., panels, notifications) animations.
    animation = layersIn, 1, 4, bounce, slide
    animation = layersOut, 1, 3, smooth, slide
}

# =============================================================================
# Input Device Settings
# =============================================================================
input {
    # Keyboard layout: US and Russian, toggled with Super+Space.
    kb_layout = us,ru
    kb_variant = ,
    kb_options = grp:win_space_toggle

    # Follow the mouse cursor when switching focus.
    follow_mouse = 1

    # Touchpad configuration.
    touchpad {
        natural_scroll = true   # Enable natural (reverse) scrolling.
    }
}

# =============================================================================
# Touchpad Gestures
# =============================================================================
gestures {
    # Four-finger horizontal swipe switches workspaces.
    gesture = 4, horizontal, workspace
    # Four-finger upward swipe opens the special workspace (scratchpad).
    gesture = 4, up, special
}

# =============================================================================
# Dwindle Layout Specifics
# =============================================================================
dwindle {
    # Preserve the split direction when moving windows.
    preserve_split = true
}

# =============================================================================
# Miscellaneous Behaviour
# =============================================================================
misc {
    # Hide the Hyprland logo at startup.
    disable_hyprland_logo = true
    # Animate windows during manual resizing.
    animate_manual_resizes = true
    # Animate windows when dragging with mouse.
    animate_mouse_windowdragging = true
    # Enable Variable Refresh Rate (VRR) for smoother gaming.
    vrr = 1
    # Allow mouse movement to wake the display from DPMS sleep.
    mouse_move_enables_dpms = true
    # Allow key presses to wake the display from DPMS sleep.
    key_press_enables_dpms = true
}

# =============================================================================
# Cursor Behaviour
# =============================================================================
cursor {
    # Hide the cursor after 3 seconds of inactivity.
    inactive_timeout = 3
}

# =============================================================================
# Key Bindings
# =============================================================================
# Most bindings use the $mod (Super) key.

# Launch terminal (kitty).
bind = $mod, Return, exec, kitty

# Launch application launcher (Rofi) – now uses grid view
bind = $mod, A, exec, ~/.config/rofi/launchers/launcher.sh

# Launch powermenu (Rofi)
bind = $mod, Delete, exec, ~/.config/rofi/powermenu/powermenu.sh 

# Open file manager (Nemo).
bind = $mod, E, exec, nemo

# Kill the active window.
bind = $mod, Backspace, killactive

# Toggle floating mode for the active window.
bind = $mod, V, togglefloating

# Lock the screen using hyprlock.
bind = $mod, X, exec, hyprlock

# Toggle fullscreen for the active window.
bind = $mod, F, fullscreen

# Focus movement (arrow keys).
bind = $mod, Left, movefocus, l
bind = $mod, Down, movefocus, d
bind = $mod, Up, movefocus, u
bind = $mod, Right, movefocus, r

# Move windows to adjacent directions.
bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Down, movewindow, d
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Right, movewindow, r

# Resize windows (with repeat – hold for continuous resizing).
binde = $mod CTRL, Left, resizeactive, -20 0
binde = $mod CTRL, Right, resizeactive, 20 0
binde = $mod CTRL, Up, resizeactive, 0 -20
binde = $mod CTRL, Down, resizeactive, 0 20

# Cycle through windows (next/prev).
bind = $mod, Tab, cyclenext
bind = $mod SHIFT, Tab, cyclenext, prev

# Switch to specific workspaces (1-5).
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8

# Switch workspaces by scrolling (mouse wheel).
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move active window to workspace 1-5.
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8

# Special workspace (scratchpad) toggle and move.
bind = $mod, S, togglespecialworkspace
bind = $mod SHIFT, S, movetoworkspace, special

# Toggle pseudo-tiling (makes windows expand to fill gaps).
bind = $mod, P, pseudo

# Notification center controls (swaync).
bind = SUPER, N, exec, swaync-client -t -sw     # Toggle notification panel.
bind = SUPER SHIFT, N, exec, swaync-client -C   # Clear all notifications.

# Screenshot shortcuts (using grim and slurp).
# Full screen screenshot.
bind = , Print, exec, grim ~/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Screenshot Saved"
# Region selection screenshot.
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Screenshot Saved"

# Dictionary lookup script (bound to the Menu key).
bind = , Menu, exec, ~/.config/scripts/define.sh

# Screen recording controls (using gpu-screen-recorder).
# Start recording.
bind = $mod, R, exec, gpu-screen-recorder -w screen -f 30 -a default_output -o ~/screen-recordings/$(date +%Y-%m-%d_%H-%M-%S).mp4 & hyprctl reload & notify-send "Recording Started"
# Stop recording (send SIGINT to the recorder).
bind = $mod SHIFT, R, exec, killall -SIGINT gpu-screen-recorder && notify-send "Recording Stopped"

# Mouse bindings for window manipulation.
bindm = $mod, mouse:272, movewindow      # Left mouse button (272) to move.
bindm = $mod, mouse:273, resizewindow    # Right mouse button (273) to resize.

# Audio volume controls (with repeat).
binde = , F1, exec, amixer set Master toggle          # Mute/unmute.
binde = , F2, exec, amixer set Master 1%-             # Decrease volume.
binde = , F3, exec, amixer set Master 1%+             # Increase volume.
binde = , XF86AudioMute, exec, amixer set Master toggle
binde = , XF86AudioLowerVolume, exec, amixer set Master 1%-
binde = , XF86AudioRaiseVolume, exec, amixer set Master 1%+

# =============================================================================
# Workspace Rules
# =============================================================================
# Make all workspaces float by default (windows will open floating).
windowrule = match:class ^(.*)$, float on

# =============================================================================
# Window Rules
# =============================================================================
# Syntax: windowrule = match:<condition>, <rule> [on]
# Conditions can be class, title, etc. Rules set properties like opacity, float, size, etc.

# Set custom opacity for specific applications.
windowrule = match:class Lorien, opacity 0.8 1
windowrule = match:class sublime_text, opacity 0.88 1
windowrule = match:class thunar, opacity 0.9 1
windowrule = match:class Thunar, opacity 0.9 1
windowrule = match:class VSCodium, opacity 0.88 1
windowrule = match:class codium, opacity 0.88 1
windowrule = match:class org.pwmt.zathura, opacity 0.9 1
windowrule = match:class firefox, opacity 1.0 1.0   # Firefox fully opaque.

# mpv media player: float, fixed size, centered, full opacity.
windowrule = match:class mpv, float on
windowrule = match:class mpv, size 640 360
windowrule = match:class mpv, center on
windowrule = match:class mpv, opacity 1.0 1.0

# Center any window that is already floating.
windowrule = match:float yes, center on

# Scratch terminal: float with large size, centered.
windowrule = match:class scratchterm, float on
windowrule = match:class scratchterm, size 85% 70%
windowrule = match:class scratchterm, center on

# Default initial size for all windows (800x600).
windowrule = match:class .*, size 800 600

# (Optional) Limit maximum window size – currently commented out.
# windowrule = match:class .*, maxsize 800 600

# Spotlight launcher window: float, centered.
# These rules ensure the launcher appears as a floating overlay without decorations
# and retains focus when opened (prevents losing focus to other windows).
windowrule = match:title Spotlight, float on
windowrule = match:title Spotlight, center on

# =============================================================================
# Layer Rules (for blur and alpha handling on overlay surfaces)
# =============================================================================
# These rules apply to layer surfaces like panels, notifications, etc.

# Waybar: enable blur and ignore fully transparent areas for better blending.
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar

# Swaync notification center and popups: blur and ignore alpha.
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-notification-window

# This makes Rofi appear with a smooth opacity transition (fade in/out)
# instead of the default slide animation defined for layers.
# Ensure your Rofi uses the namespace "rofi" (default).
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi
layerrule = animation rofiFade, match:namespace rofi

# =============================================================================
# Plugin Configuration – hyprbars (Titlebars)
# =============================================================================
# The hyprbars plugin adds window titlebars with customisable appearance.
plugin {
    hyprbars {
        # Titlebar height in pixels.
        bar_height = 25
        # Background colour of the titlebar.
        col.bar = rgb(2a2b36)
        # Text colour for the title.
        col.text = rgb(ffffff)
        # Optional buttons (minimize, maximise, close) – commented out by default.
        # buttons = minimize, maximize, close
    }
}
